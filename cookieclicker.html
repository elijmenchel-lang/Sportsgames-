<!DOCTYPE html>
<html>
<head>
    <title>Simple Cookie Clicker</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background-color: #f0f0f0; }
        #cookie { font-size: 100px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        #cookie:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Cookies: <span id="score">0</span></h1>
    <div id="cookie">🍪</div>
    <p>Click the cookie!</p>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const cookie = document.getElementById('cookie');

        cookie.addEventListener('click', () => {
            score++;
            scoreDisplay.textContent = score;
        });
    </script>
</body>
</html>
