<!DOCTYPE html>
<html>
<head>
  <title>Sports Games Hub</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .game-card {
      background: #222;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #333;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #28a745;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🏈 Sports Games Hub</h1>

<div class="grid">

  <div class="game-card">
    <h2>Retro Bowl</h2>
    <p>External version</p>
    <a href="https://poki.com/en/g/retro-bowl" target="_blank">
      <button>Play</button>
    </a>
  </div>

  <div class="game-card">
    <h2>My Football Game</h2>
    <p>Built by me</p>
    <a href="football.html">
      <button>Play</button>
    </a>
  </div>

  <div class="game-card">
    <h2>More Games</h2>
    <p>Coming soon</p>
    <button>...</button>
  </div>

</div>

</body>
</html>
