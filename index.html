<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Games</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        .topnav {
            margin: 20px;
        }

        .topnav button {
            margin: 5px;
        }

        .game {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Sports Games</h1>

<div class="topnav">
    <button>Home</button>
    <button>Sports</button>
    <button>Games</button>
</div>

<div class="game">
    <h2>Retro Bowl</h2>

    <a href="https://retro-bowl.com" target="_blank">
        <button>Play Retro Bowl</button>
    </a>

    <iframe src="https://retro-bowl-six.vercel.app"></iframe>
</div>

<div class="game">
    <h2>More Games Coming Soon</h2>
    <button>Stay Tuned</button>
</div>

</body>
</html>
