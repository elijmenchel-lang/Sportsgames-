<!DOCTYPE html>
<html>
<head>
  <title>Football Game</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background: #0b6623;
      color: white;
    }

    canvas {
      background: #1e7f3f;
      border: 3px solid white;
      margin-top: 20px;
    }

    h1 {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🏈 Football Game</h1>
<p>Click to pass the ball past defenders!</p>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// teams
let playerScore = 0;
let enemyScore = 0;

// ball
let ball = { x: 250, y: 550, dy: 0 };

// defenders
let defenders = [
  { x: 100, y: 200 },
  { x: 250, y: 300 },
  { x: 400, y: 200 }
];

function drawField() {
  ctx.fillStyle = "#1e7f3f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // goal zone
  ctx.fillStyle = "yellow";
  ctx.fillRect(0, 0, 500, 50);
}

function drawBall() {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2);
  ctx.fill();
}

function drawDefenders() {
  ctx.fillStyle = "red";
  defenders.forEach(d => {
    ctx.fillRect(d.x, d.y, 30, 30);
  });
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.fillText("You: " + playerScore, 10, 20);
  ctx.fillText("CPU: " + enemyScore, 420, 20);
}

function moveDefenders() {
  defenders.forEach(d => {
    d.x += Math.sin(Date.now() / 500) * 2;
  });
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawField();
  drawBall();
  drawDefenders();
  drawScore();

  ball.y += ball.dy;
  ball.dy += 0.4;

  moveDefenders();

  // collision
  defenders.forEach(d => {
    if (
      ball.x > d.x &&
      ball.x < d.x + 30 &&
      ball.y > d.y &&
      ball.y < d.y + 30
    ) {
      enemyScore++;
      resetBall();
    }
  });

  // touchdown
  if (ball.y < 50) {
    playerScore++;
    resetBall();
  }

  // reset if missed
  if (ball.y > 600) {
    enemyScore++;
    resetBall();
  }

  requestAnimationFrame(update);
}

function resetBall() {
  ball.y = 550;
  ball.dy = 0;
}

// click to throw
canvas.addEventListener("click", () => {
  ball.dy = -10;
});

update();
</script>

</body>
</html>
