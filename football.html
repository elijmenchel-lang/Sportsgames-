<!DOCTYPE html>
<html>
<head>
  <title>Football Game</title>

  <style>
    body {
      margin: 0;
      background: #0b6623;
      font-family: Arial;
      text-align: center;
      color: white;
    }

    canvas {
      background: #1e7f3f;
      display: block;
      margin: auto;
      border: 3px solid white;
    }
  </style>
</head>

<body>

<h1>🏈 Football Game</h1>
<p>Click to pass • Aim with mouse</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// score
let score = 0;

// QB
let qb = { x: 100, y: 200 };

// ball
let ball = { x: qb.x, y: qb.y, dx: 0, dy: 0, thrown: false };

// receivers
let receivers = [
  { x: 200, y: 100, route: "down" },
  { x: 200, y: 300, route: "up" }
];

// defenders
let defenders = [
  { x: 400, y: 150 },
  { x: 500, y: 250 }
];

// mouse aim
let mouse = { x: 0, y: 0 };

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

// throw ball
canvas.addEventListener("click", () => {
  if (!ball.thrown) {
    ball.dx = (mouse.x - qb.x) / 20;
    ball.dy = (mouse.y - qb.y) / 20;
    ball.thrown = true;
  }
});

function drawField() {
  ctx.fillStyle = "#1e7f3f";
  ctx.fillRect(0, 0, 800, 400);

  // end zone
  ctx.fillStyle = "yellow";
  ctx.fillRect(750, 0, 50, 400);
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 800, 40);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 25);
}

function drawQB() {
  ctx.fillStyle = "blue";
  ctx.fillRect(qb.x - 10, qb.y - 10, 20, 20);
}

function drawReceivers() {
  ctx.fillStyle = "cyan";
  receivers.forEach(r => {
    ctx.fillRect(r.x - 10, r.y - 10, 20, 20);
  });
}

function drawDefenders() {
  ctx.fillStyle = "red";
  defenders.forEach(d => {
    ctx.fillRect(d.x - 10, d.y - 10, 20, 20);
  });
}

// football shape
function drawBall() {
  ctx.fillStyle = "brown";
  ctx.beginPath();
  ctx.ellipse(ball.x, ball.y, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
}

function moveReceivers() {
  receivers.forEach(r => {
    if (r.route === "down") r.x += 1.5;
    if (r.route === "up") {
      r.x += 1.5;
      r.y -= 0.5;
    }
  });
}

function moveDefenders() {
  defenders.forEach(d => {
    let target = receivers[0];
    let dx = target.x - d.x;
    let dy = target.y - d.y;
    d.x += dx * 0.01;
    d.y += dy * 0.01;
  });
}

function updateBall() {
  if (ball.thrown) {
    ball.x += ball.dx;
    ball.y += ball.dy;
  } else {
    ball.x = qb.x;
    ball.y = qb.y;
  }
}

// catch logic
function checkCatch() {
  receivers.forEach(r => {
    if (
      Math.abs(ball.x - r.x) < 15 &&
      Math.abs(ball.y - r.y) < 15
    ) {
      // caught → run to endzone
      ball.thrown = false;
      r.route = "run";
      r.caught = true;
    }
  });
}

// touchdown
function checkTouchdown() {
  receivers.forEach(r => {
    if (r.caught) {
      r.x += 2;

      if (r.x > 750) {
        score++;
        reset();
      }
    }
  });
}

// reset play
function reset() {
  ball.thrown = false;

  receivers = [
    { x: 200, y: 100, route: "down" },
    { x: 200, y: 300, route: "up" }
  ];

  defenders = [
    { x: 400, y: 150 },
    { x: 500, y: 250 }
  ];
}

function gameLoop() {
  ctx.clearRect(0, 0, 800, 400);

  drawField();
  drawScore();
  drawQB();
  drawReceivers();
  drawDefenders();
  drawBall();

  moveReceivers();
  moveDefenders();
  updateBall();
  checkCatch();
  checkTouchdown();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
