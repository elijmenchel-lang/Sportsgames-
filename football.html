<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Game</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .menu {
            margin-top: 100px;
        }
        .menu h1 {
            margin-bottom: 40px;
        }
        .menu button {
            padding: 15px 30px;
            margin: 15px;
            font-size: 18px;
            background: #28a745;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .menu button:hover {
            background: #218838;
        }
        #gameCanvas {
            display: none;
            margin: 30px auto;
            border: 3px solid white;
            background: #1e7f3f;
        }
        /* Basic scoreboard */
        #scoreboard {
            margin-top: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="menu" id="menu">
        <h1>🏈 Football Game</h1>
        <button onclick="startGame()">Start Game</button>
        <button onclick="showPlaybook()">Playbook</button>
    </div>

    <canvas id="gameCanvas" width="900" height="450"></canvas>
    <div id="scoreboard">SCORE: 0</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = 'menu';  // can be 'menu', 'playbook', 'game'
        let score = 0;
        
        function startGame() {
            gameState = 'game';
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        function showPlaybook() {
            gameState = 'playbook';
            alert('Playbook is a work in progress! For now, we will start the game.');
            startGame(); // Temporarily start the game
        }

        function resetGame() {
            score = 0;
            // You can add more reset logic here (e.g., reset player positions, downs, etc.)
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawField();
            drawPlayers();
            drawBall();
            drawScoreboard();

            // Add game logic here (e.g., handle player movement, ball throw, etc.)
            requestAnimationFrame(gameLoop);
        }

        function drawField() {
            ctx.fillStyle = '#1e7f3f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Add yard lines (for example every 100 pixels)
            ctx.strokeStyle = 'white';
            for (let i = 0; i <= canvas.width; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            // End zone
            ctx.fillStyle = 'gold';
            ctx.fillRect(canvas.width - 50, 0, 50, canvas.height);
        }

        // Simple placeholders for players and ball
        let qb = { x: 150, y: 225 };
        let ball = { x: qb.x, y: qb.y, vx: 0, vy: 0, thrown: false };

        function drawPlayers() {
            // QB
            ctx.fillStyle = 'blue';
            ctx.fillRect(qb.x - 8, qb.y - 10, 16, 20);

            // You can add more players here (like RBs, WRs, defenders)
        }

        function drawBall() {
            ctx.fillStyle = 'brown';
            ctx.beginPath();
            ctx.ellipse(ball.x, ball.y, 10, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawScoreboard() {
            document.getElementById('scoreboard').innerText = 'SCORE: ' + score;
        }

        // Example input: throw ball on click
        canvas.addEventListener('click', () => {
            if (!ball.thrown) {
                ball.thrown = true;
                ball.vx = 5; // example: throw horizontally
                ball.vy = -2; // example: throw slightly up
            }
        });

        // Example ball movement
        function updateBall() {
            if (ball.thrown) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vy += 0.2; // gravity effect
            } else {
                ball.x = qb.x;
                ball.y = qb.y;
            }
            // Add logic for scoring or catching
        }

        // Adjust the game loop to update ball position
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawField();
            drawPlayers();
            drawBall();
            drawScoreboard();
            updateBall();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
