<!DOCTYPE html>
<html>
<head>
<title>Football Game</title>

<style>
body {
  margin: 0;
  background: #0b6623;
  text-align: center;
  font-family: Arial;
  color: white;
}
canvas {
  display: block;
  margin: auto;
  border: 3px solid white;
  background: #1e7f3f;
}
</style>
</head>

<body>

<h1>🏈 Football Game</h1>
<p>Click = Snap | Drag = Throw | WASD = Move | Shift = Juke | R = Run</p>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// GAME FLOW
let state = "preplay"; // preplay, play, halftime, gameover

// TIME
let quarter = 1;
let timeLeft = 60; // seconds
let lastTimeUpdate = Date.now();

// SCORE
let score = 0;

// FIELD
let lineOfScrimmage = 150;
let firstDownLine = 350;
let down = 1;

// PLAYERS
let qb = { x: lineOfScrimmage, y: 225, speed: 3 };
let rb = { x: lineOfScrimmage - 30, y: 260, speed: 3, hasBall: false };

// BALL
let ball = { x: qb.x, y: qb.y, vx: 0, vy: 0, thrown: false };
let gravity = 0.25;

// DEFENSE
let defenders = [];

// INPUT
let keys = {};

// SETUP
function setupPlay() {
  defenders = [
    { x: lineOfScrimmage + 200, y: 120 },
    { x: lineOfScrimmage + 250, y: 225 },
    { x: lineOfScrimmage + 200, y: 330 }
  ];
  rb.hasBall = false;
}

setupPlay();

// INPUT
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousedown", () => {
  if (state === "preplay") state = "play";
});

// RUN
document.addEventListener("keydown", e => {
  if (e.key === "r" && state === "play") rb.hasBall = true;
});

// MOVE
function movePlayer(p) {
  let speed = keys["shift"] ? p.speed * 2 : p.speed;

  if (keys["w"]) p.y -= speed;
  if (keys["s"]) p.y += speed;
  if (keys["a"]) p.x -= speed;
  if (keys["d"]) p.x += speed;
}

// CLOCK
function updateClock() {
  if (state !== "play") return;

  let now = Date.now();
  if (now - lastTimeUpdate >= 1000) {
    timeLeft--;
    lastTimeUpdate = now;

    if (timeLeft <= 0) {
      if (quarter === 2) {
        state = "halftime";
        setTimeout(() => nextQuarter(), 3000);
      } else if (quarter === 4) {
        state = "gameover";
        setTimeout(resetGame, 5000);
      } else {
        nextQuarter();
      }
    }
  }
}

function nextQuarter() {
  quarter++;
  timeLeft = 60;
  state = "preplay";
}

// DRAW FIELD
function drawField() {
  ctx.fillStyle = "#1e7f3f";
  ctx.fillRect(0,0,900,450);

  ctx.strokeStyle = "blue";
  ctx.beginPath();
  ctx.moveTo(lineOfScrimmage,0);
  ctx.lineTo(lineOfScrimmage,450);
  ctx.stroke();

  ctx.strokeStyle = "yellow";
  ctx.beginPath();
  ctx.moveTo(firstDownLine,0);
  ctx.lineTo(firstDownLine,450);
  ctx.stroke();
}

// UI
function drawUI() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,900,50);

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";

  ctx.fillText(`Q${quarter}`, 20, 30);
  ctx.fillText(`TIME: ${timeLeft}`, 80, 30);
  ctx.fillText(`DOWN: ${down}`, 200, 30);
  ctx.fillText(`SCORE: ${score}`, 320, 30);
}

// SCREENS
function drawOverlay() {
  if (state === "halftime") {
    drawCenterText("HALFTIME");
  }
  if (state === "gameover") {
    drawCenterText("GAME OVER - SCORE: " + score);
  }
}

function drawCenterText(text) {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0,0,900,450);

  ctx.fillStyle = "white";
  ctx.font = "40px Arial";
  ctx.fillText(text, 200, 220);
}

// PLAYER
function drawPlayer(p,color) {
  ctx.fillStyle = color;
  ctx.fillRect(p.x-8,p.y-10,16,20);

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(p.x, p.y-15, 6, 0, Math.PI*2);
  ctx.fill();
}

// BALL
function drawBall() {
  ctx.fillStyle = "brown";
  ctx.beginPath();
  ctx.ellipse(ball.x, ball.y, 10, 6, 0, 0, Math.PI*2);
  ctx.fill();
}

// LOGIC
function updateBall() {
  if (rb.hasBall) {
    ball.x = rb.x;
    ball.y = rb.y;
  } else {
    ball.x = qb.x;
    ball.y = qb.y;
  }
}

function moveDefense() {
  let carrier = rb.hasBall ? rb : qb;

  defenders.forEach(d => {
    d.x += (carrier.x - d.x) * 0.03;
    d.y += (carrier.y - d.y) * 0.03;
  });
}

function checkTackle() {
  let carrier = rb.hasBall ? rb : qb;

  defenders.forEach(d => {
    if (
      Math.abs(d.x - carrier.x) < 15 &&
      Math.abs(d.y - carrier.y) < 15
    ) {
      endPlay(carrier.x);
    }
  });
}

function endPlay(newX) {
  if (newX > 850) {
    score += 7;
    resetDrive();
    return;
  }

  if (newX >= firstDownLine) {
    down = 1;
    lineOfScrimmage = newX;
    firstDownLine = lineOfScrimmage + 200;
  } else {
    down++;
    lineOfScrimmage = newX;
  }

  if (down > 4) resetDrive();

  resetPositions();
}

// RESET
function resetPositions() {
  state = "preplay";

  qb.x = lineOfScrimmage;
  qb.y = 225;

  rb.x = lineOfScrimmage - 30;
  rb.y = 260;

  setupPlay();
}

function resetDrive() {
  lineOfScrimmage = 150;
  firstDownLine = 350;
  down = 1;
  resetPositions();
}

function resetGame() {
  score = 0;
  quarter = 1;
  timeLeft = 60;
  resetDrive();
}

// LOOP
function gameLoop() {
  ctx.clearRect(0,0,900,450);

  drawField();
  drawUI();

  if (state === "play") {
    if (rb.hasBall) movePlayer(rb);
    else movePlayer(qb);
  }

  updateBall();
  moveDefense();
  checkTackle();
  updateClock();

  drawPlayer(qb,"blue");
  drawPlayer(rb,"cyan");
  defenders.forEach(d => drawPlayer(d,"red"));

  drawBall();
  drawOverlay();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
