<!DOCTYPE html>
<html>
<head>
  <title>Football Game</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background: #0b6623;
      color: white;
    }

    canvas {
      background: #1e7f3f;
      border: 3px solid white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🏈 Football Game</h1>
<p>Click to throw • Move mouse left/right to aim</p>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// scores
let playerScore = 0;
let cpuScore = 0;

// ball
let ball = { x: 250, y: 550, dx: 0, dy: 0 };

// defenders
let defenders = [
  { x: 100, y: 200 },
  { x: 250, y: 300 },
  { x: 400, y: 200 }
];

// aim control
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  ball.x = e.clientX - rect.left;
});

// throw
canvas.addEventListener("click", () => {
  ball.dy = -10;
  ball.dx = (Math.random() - 0.5) * 4;
});

function drawField() {
  ctx.fillStyle = "#1e7f3f";
  ctx.fillRect(0, 0, 500, 600);

  // end zone
  ctx.fillStyle = "yellow";
  ctx.fillRect(0, 0, 500, 50);
}

function drawBall() {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2);
  ctx.fill();
}

function drawDefenders() {
  ctx.fillStyle = "red";
  defenders.forEach(d => {
    ctx.fillRect(d.x, d.y, 30, 30);
  });
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";

  ctx.fillText("HOME: " + playerScore, 10, 25);
  ctx.fillText("AWAY: " + cpuScore, 350, 25);
}

function moveDefenders() {
  defenders.forEach((d, i) => {
    d.x += Math.sin(Date.now() / (400 + i * 100)) * 2;
  });
}

function update() {
  ctx.clearRect(0, 0, 500, 600);

  drawField();
  drawScore();
  drawBall();
  drawDefenders();

  ball.x += ball.dx;
  ball.y += ball.dy;
  ball.dy += 0.4;

  moveDefenders();

  // collision
  defenders.forEach(d => {
    if (
      ball.x > d.x &&
      ball.x < d.x + 30 &&
      ball.y > d.y &&
      ball.y < d.y + 30
    ) {
      cpuScore++;
      resetBall();
    }
  });

  // touchdown
  if (ball.y < 50) {
    playerScore++;
    resetBall();
  }

  // miss
  if (ball.y > 600) {
    cpuScore++;
    resetBall();
  }

  requestAnimationFrame(update);
}

function resetBall() {
  ball.x = 250;
  ball.y = 550;
  ball.dy = 0;
  ball.dx = 0;
}

update();
</script>

</body>
</html>
