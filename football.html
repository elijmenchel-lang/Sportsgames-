<!DOCTYPE html>
<html>
<head>
<title>Football Game</title>

<style>
body {
  margin: 0;
  background: #0b6623;
  text-align: center;
  font-family: Arial;
  color: white;
}
canvas {
  display: block;
  margin: auto;
  border: 3px solid white;
  background: #1e7f3f;
}
</style>
</head>

<body>

<h1>🏈 Football Game</h1>
<p>Drag to aim, release to throw</p>

<canvas id="game" width="800" height="400"></canvas>

<audio id="throwSound" src="https://actions.google.com/sounds/v1/sports/football_throw.ogg"></audio>
<audio id="catchSound" src="https://actions.google.com/sounds/v1/sports/catch_ball.ogg"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// score
let home = 0;
let away = 0;

// QB
let qb = { x: 100, y: 200 };

// ball
let ball = { x: qb.x, y: qb.y, dx: 0, dy: 0, thrown: false };

// drag
let dragging = false;
let dragX = 0;
let dragY = 0;

// receiver
let receiver = { x: 250, y: 200, caught: false };

// defender
let defender = { x: 500, y: 200 };

// sounds
const throwSound = document.getElementById("throwSound");
const catchSound = document.getElementById("catchSound");

// drag controls
canvas.addEventListener("mousedown", e => {
  dragging = true;
});

canvas.addEventListener("mouseup", e => {
  if (dragging) {
    ball.dx = (dragX - qb.x) / 15;
    ball.dy = (dragY - qb.y) / 15;
    ball.thrown = true;
    throwSound.play();
  }
  dragging = false;
});

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  dragX = e.clientX - rect.left;
  dragY = e.clientY - rect.top;
});

// field
function drawField() {
  ctx.fillStyle = "#1e7f3f";
  ctx.fillRect(0,0,800,400);

  ctx.fillStyle = "yellow";
  ctx.fillRect(750,0,50,400);
}

// scoreboard
function drawScore() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,800,40);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("HOME: " + home, 20, 25);
  ctx.fillText("AWAY: " + away, 650, 25);
}

// stick player
function drawPlayer(x,y,color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;

  // head
  ctx.beginPath();
  ctx.arc(x, y-10, 5, 0, Math.PI*2);
  ctx.stroke();

  // body
  ctx.beginPath();
  ctx.moveTo(x, y-5);
  ctx.lineTo(x, y+10);
  ctx.stroke();

  // arms
  ctx.beginPath();
  ctx.moveTo(x-5,y);
  ctx.lineTo(x+5,y);
  ctx.stroke();

  // legs
  ctx.beginPath();
  ctx.moveTo(x,y+10);
  ctx.lineTo(x-5,y+20);
  ctx.moveTo(x,y+10);
  ctx.lineTo(x+5,y+20);
  ctx.stroke();
}

// football
function drawBall() {
  ctx.fillStyle = "brown";
  ctx.beginPath();
  ctx.ellipse(ball.x, ball.y, 8, 5, 0, 0, Math.PI*2);
  ctx.fill();
}

// aim line
function drawAim() {
  if (dragging) {
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.moveTo(qb.x, qb.y);
    ctx.lineTo(dragX, dragY);
    ctx.stroke();
  }
}

// logic
function update() {
  if (ball.thrown) {
    ball.x += ball.dx;
    ball.y += ball.dy;
  } else {
    ball.x = qb.x;
    ball.y = qb.y;
  }

  // receiver moves
  if (!receiver.caught) receiver.x += 1.5;

  // defender chases
  defender.x -= 0.5;

  // catch
  if (
    Math.abs(ball.x - receiver.x) < 10 &&
    Math.abs(ball.y - receiver.y) < 10
  ) {
    receiver.caught = true;
    catchSound.play();
  }

  // run after catch
  if (receiver.caught) {
    receiver.x += 2;
  }

  // touchdown
  if (receiver.x > 750) {
    home++;
    reset();
  }

  // miss → reset
  if (ball.x > 800 || ball.y < 0 || ball.y > 400) {
    away++;
    reset();
  }
}

// reset
function reset() {
  ball.thrown = false;
  receiver = { x: 250, y: 200, caught: false };
  defender = { x: 500, y: 200 };
}

// loop
function gameLoop() {
  ctx.clearRect(0,0,800,400);

  drawField();
  drawScore();
  drawPlayer(qb.x,qb.y,"blue");
  drawPlayer(receiver.x,receiver.y,"cyan");
  drawPlayer(defender.x,defender.y,"red");
  drawBall();
  drawAim();

  update();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
